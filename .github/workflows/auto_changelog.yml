name: Auto-Generate CHANGELOG

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'DRAFT_CHANGELOG.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    name: Generate and commit CHANGELOG.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate CHANGELOG.md
        # --all scans full history, --output writes directly to CHANGELOG.md
        run: python generate_changelog.py --all --output CHANGELOG.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update CHANGELOG.md"
          branch: auto-changelog
          delete-branch: true
          title: "chore: auto-update CHANGELOG.md"
          body: |
            Automated CHANGELOG update generated by `generate_changelog.py`.
            Review and merge if accurate.
          labels: automation
